spring:
  config:
    import: optional:file:.env
  application:
    name: P01-server
  datasource:
    url: jdbc:mysql://localhost:3306/proj01?serverTimezone=UTC&useUnicode=true&characterEncoding=utf-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: password
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 10MB
      file-size-threshold: 0B

mybatis:
  configuration:
    map-underscore-to-camel-case: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

fallensakura:
  jwt:
    admin-secret-key: ${ADMIN_SECRET_KEY}
    admin-token-name: ${ADMIN_TOKEN_NAME}
    expiration-time: ${JWT_EXPIRATION_TIME}
    user-expiration-time: ${JWT_USER_EXPIRATION_TIME}
    user-secret-key: ${USER_SECRET_KEY}
    user-token-name: ${USER_TOKEN_NAME}

  wechat:
    appid: ${WECHAT_APPID}
    secret: ${WECHAT_SECRET}

cloudflare:
  r2:
    endpoint: ${CLOUDFLARE_R2_ENDPOINT}
    access-key: ${CLOUDFLARE_R2_ACCESS_KEY}
    secret-key: ${CLOUDFLARE_R2_SECRET_KEY}
    bucket-name: ${CLOUDFLARE_R2_BUCKET_NAME}
    region: ${CLOUDFLARE_R2_REGION:auto}
    public-url: ${CLOUDFLARE_R2_PUBLIC_URL}